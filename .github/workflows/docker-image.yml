name: Docker CI

on:
  push:
    branches: [ "main" ]
    
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Login en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Imagen
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/docker-ci-cd-demo:latest .

    - name: Push Imagen
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/docker-ci-cd-demo:latest
